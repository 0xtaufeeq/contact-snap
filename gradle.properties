# jdk.net.unixdomain.tmpdir: JDK 17's NIO selector self-pipe uses an AF_UNIX
# socket; its default auto-bind dir can fail on some Windows setups. Point it at
# a known-good short path so Gradle's loopback connection works.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djdk.net.unixdomain.tmpdir=C:\\Windows\\Temp
org.gradle.caching=true
org.gradle.parallel=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
